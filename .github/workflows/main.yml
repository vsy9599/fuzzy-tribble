name: Dummy CI-CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Print Hello
        run: echo "Hello GitHub Actions!"

      - name: Show Date
        run: date

      - name: Show Current Directory
        run: pwd

      - name: List Files
        run: ls -R

      - name: Success
        run: echo "Workflow completed successfully!"
