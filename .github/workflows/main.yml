trigger:
- main

pr:
- main

pool:
  vmImage: 'ubuntu-latest'

variables:
  NodeVersion: '20.x'
  BuildFolder: 'build'
  TargetFolder: '/var/www/html'

steps:

# Checkout source code
- checkout: self
  displayName: 'Checkout Source Code'

# Install Node.js
- task: NodeTool@0
  displayName: 'Install Node.js'
  inputs:
    versionSpec: '$(NodeVersion)'

# Install dependencies
- script: |
    npm install
  displayName: 'Install Dependencies'

# Run tests (optional)
- script: |
    npm test -- --watchAll=false
  displayName: 'Run Unit Tests'
  continueOnError: true

# Build React application
- script: |
    npm run build
  displayName: 'Build React Application'

# Publish build artifacts
- task: PublishBuildArtifacts@1
  displayName: 'Publish Build Artifact'
  inputs:
    PathtoPublish: '$(Build.SourcesDirectory)/$(BuildFolder)'
    ArtifactName: 'react-build'

# Copy build files to AWS Lightsail
- task: CopyFilesOverSSH@0
  displayName: 'Deploy to AWS Lightsail'
  inputs:
    sshEndpoint: 'LightsailSSH'
    sourceFolder: '$(Build.SourcesDirectory)/$(BuildFolder)'
    contents: '**'
    targetFolder: '$(TargetFolder)'
    cleanTargetFolder: true
    overwrite: true

# Restart Nginx
- task: SSH@0
  displayName: 'Restart Nginx'
  inputs:
    sshEndpoint: 'LightsailSSH'
    runOptions: 'inline'
    inline: |
      sudo systemctl restart nginx
      sudo systemctl status nginx --no-pager
